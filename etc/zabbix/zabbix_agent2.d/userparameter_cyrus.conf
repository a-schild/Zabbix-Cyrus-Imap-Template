# Cyrus IMAP child-saturation UserParameter for Zabbix Agent / Agent 2
#
# Install:
#   - Copy cyrus-check.sh to /usr/local/lib/zabbix/externalscripts/cyrus-check.sh
#     and `chmod 755` it.
#   - Drop this file into the agent include dir:
#       Agent 2: /etc/zabbix/zabbix_agent2.d/userparameter_cyrus.conf
#       Agent 1: /etc/zabbix/zabbix_agentd.d/userparameter_cyrus.conf
#   - Restart the agent.
#
# One master item collects everything in a single pass as JSON; the
# "Cyrus IMAP by Zabbix agent" template splits it into dependent items
# (children + utilisation % per service) via JSONPath preprocessing.
# Only this one UserParameter is needed on the agent.
#
#   cyrus.stats  ->  {"master_alive":1,
#                     "imap": {"children":N,"maxchild":600,"pct":P}, ... }
#
# The template's master item is an ACTIVE check (item type Zabbix agent (active)).
# For it to collect, the agent config must have:
#       ServerActive=<zabbix server or proxy>
#       Hostname=<exact host name as configured in Zabbix>
# UserParameters behave identically for active and passive checks, so no other
# agent change is needed. Test locally any time with:
#       zabbix_agent2 -t cyrus.stats        # (or zabbix_agentd -t cyrus.stats)
#
# Repository: https://github.com/a-schild/Zabbix-Cyrus-Imap-Template

UserParameter=cyrus.stats,/usr/local/lib/zabbix/externalscripts/cyrus-check.sh json
