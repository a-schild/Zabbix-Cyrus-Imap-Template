zabbix_export:
  version: '7.0'
  template_groups:
    - uuid: 0b37c58202824307a81df451365d12e3
      name: Templates/Applications
  templates:
    - uuid: 63879437d28248afba0cafb72ecd682b
      template: Cyrus IMAP by Zabbix agent
      name: Cyrus IMAP by Zabbix agent
      description: |
        Cyrus IMAP/POP3/LMTP/ManageSieve child-saturation monitoring.

        A single master item `cyrus.stats` runs cyrus-check.sh once per interval
        and returns JSON; dependent items split it per service. The maxchild caps
        are read from the host's cyrus.conf at collection time, so the utilisation
        percentages self-adjust if you retune them.

        When a Cyrus service reaches its maxchild cap, the master accepts new
        connections but cannot fork a worker to handle them, so clients stall
        (IMAP/POP3 logins time out; LMTP deliveries defer). These items warn
        before that happens.

        Collection is via Zabbix ACTIVE agent (item type Zabbix agent (active)).
        Requires on the monitored host:
          - /usr/local/lib/zabbix/externalscripts/cyrus-check.sh (chmod 755)
          - UserParameter=cyrus.stats,/usr/local/lib/zabbix/externalscripts/cyrus-check.sh json
          - agent config: ServerActive=<zabbix server/proxy> AND
            Hostname=<exact host name configured in Zabbix> (active checks are
            matched to the host by Hostname; the host must also allow active checks).

        Repository: https://github.com/a-schild/Zabbix-Cyrus-Imap-Template
      groups:
        - name: Templates/Applications
      macros:
        - macro: '{$CYRUS.LOG}'
          value: /var/log/mail.log
          description: 'Path to the syslog file Cyrus writes to (Debian/Ubuntu: /var/log/mail.log; RHEL/CentOS: /var/log/maillog).'
      items:
        - uuid: a518ac7c82e3484fb0ec622d3ff35cc9
          name: 'Cyrus: stats (raw JSON)'
          type: ZABBIX_ACTIVE
          key: cyrus.stats
          delay: 1m
          history: 1h
          trends: '0'
          value_type: TEXT
          description: 'Master item: one-pass JSON with per-service child counts, maxchild caps, and utilisation %.'
          tags:
            - tag: component
              value: cyrus
        - uuid: 4119dac0c3f94a429f1ea8a7a59c5abd
          name: 'Cyrus: master process alive'
          type: DEPENDENT
          key: cyrus.master.alive
          history: 7d
          trends: '0'
          value_type: UNSIGNED
          valuemap:
            name: Cyrus service state
          master_item:
            key: cyrus.stats
          preprocessing:
            - type: JSONPATH
              parameters:
                - $.master_alive
          tags:
            - tag: component
              value: cyrus
          triggers:
            - uuid: 0e073eba53ce4f72b6eedd6711a77523
              expression: 'last(/Cyrus IMAP by Zabbix agent/cyrus.master.alive)=0'
              name: 'Cyrus: master process is not running'
              priority: HIGH
              description: 'cyrmaster is not running (or cyrus-imapd unit inactive). All mailbox access and LMTP delivery to this host are down.'
        - uuid: c578dc534047406880804ad714d3d558
          name: 'Cyrus: IMAP children'
          type: DEPENDENT
          key: cyrus.imap.children
          history: 7d
          trends: 365d
          value_type: UNSIGNED
          description: 'Current imapd children (imap:143 + imaps:993 share the binary).'
          master_item:
            key: cyrus.stats
          preprocessing:
            - type: JSONPATH
              parameters:
                - $.imap.children
          tags:
            - tag: component
              value: imap
        - uuid: d093edcdd0a644b699a759691a585eef
          name: 'Cyrus: IMAP children utilisation'
          type: DEPENDENT
          key: cyrus.imap.pct
          history: 7d
          trends: 365d
          value_type: UNSIGNED
          units: '%'
          description: 'imapd children as % of the imap (:143) maxchild cap.'
          master_item:
            key: cyrus.stats
          preprocessing:
            - type: JSONPATH
              parameters:
                - $.imap.pct
          tags:
            - tag: component
              value: imap
          triggers:
            - uuid: 3e8fe072844948448ad70a96c54bb675
              expression: 'avg(/Cyrus IMAP by Zabbix agent/cyrus.imap.pct,#3)>80 and avg(/Cyrus IMAP by Zabbix agent/cyrus.imap.pct,#3)<=95'
              name: 'Cyrus: IMAP children >80% of maxchild'
              priority: WARNING
              description: 'imapd children sustained above 80% of maxchild. Approaching the cap at which new IMAP connections start to stall.'
            - uuid: 281c9c7ed4cd494ba000db9ecef509db
              expression: 'avg(/Cyrus IMAP by Zabbix agent/cyrus.imap.pct,#3)>95'
              name: 'Cyrus: IMAP children >95% of maxchild (saturation imminent)'
              priority: HIGH
              description: 'imapd children sustained above 95% of maxchild. New IMAP logins will start timing out (e.g. a front-end proxy logs "Login timed out in state=/none"). Raise imap maxchild in cyrus.conf.'
        - uuid: 18b22126748244c6964326defc18e47c
          name: 'Cyrus: POP3 children'
          type: DEPENDENT
          key: cyrus.pop3.children
          history: 7d
          trends: 365d
          value_type: UNSIGNED
          description: 'Current pop3d children (pop3:110 + pop3s:995 share the binary).'
          master_item:
            key: cyrus.stats
          preprocessing:
            - type: JSONPATH
              parameters:
                - $.pop3.children
          tags:
            - tag: component
              value: pop3
        - uuid: aff00d64c7ec474eb0fdecfc445e4b9b
          name: 'Cyrus: POP3 children utilisation'
          type: DEPENDENT
          key: cyrus.pop3.pct
          history: 7d
          trends: 365d
          value_type: UNSIGNED
          units: '%'
          description: 'pop3d children as % of the pop3 (:110) maxchild cap.'
          master_item:
            key: cyrus.stats
          preprocessing:
            - type: JSONPATH
              parameters:
                - $.pop3.pct
          tags:
            - tag: component
              value: pop3
          triggers:
            - uuid: ae78564cfaf547618bb60acaad726318
              expression: 'avg(/Cyrus IMAP by Zabbix agent/cyrus.pop3.pct,#3)>80 and avg(/Cyrus IMAP by Zabbix agent/cyrus.pop3.pct,#3)<=95'
              name: 'Cyrus: POP3 children >80% of maxchild'
              priority: WARNING
              description: 'pop3d children sustained above 80% of maxchild.'
            - uuid: 5f8eea4afc5f4ad9a16f64f64d8b677a
              expression: 'avg(/Cyrus IMAP by Zabbix agent/cyrus.pop3.pct,#3)>95'
              name: 'Cyrus: POP3 children >95% of maxchild (saturation imminent)'
              priority: HIGH
              description: 'pop3d children sustained above 95% of maxchild. Raise pop3 maxchild in cyrus.conf.'
        - uuid: 3e82ef1e4c9a46f3be9600a2586f91db
          name: 'Cyrus: LMTP children'
          type: DEPENDENT
          key: cyrus.lmtp.children
          history: 7d
          trends: 365d
          value_type: UNSIGNED
          description: 'Current lmtpd children (lmtp:24 + lmtpunix share the binary).'
          master_item:
            key: cyrus.stats
          preprocessing:
            - type: JSONPATH
              parameters:
                - $.lmtp.children
          tags:
            - tag: component
              value: lmtp
        - uuid: b3d8f1eab278487784e9b48e099960e9
          name: 'Cyrus: LMTP children utilisation'
          type: DEPENDENT
          key: cyrus.lmtp.pct
          history: 7d
          trends: 365d
          value_type: UNSIGNED
          units: '%'
          description: 'lmtpd children as % of the lmtp (:24) maxchild cap.'
          master_item:
            key: cyrus.stats
          preprocessing:
            - type: JSONPATH
              parameters:
                - $.lmtp.pct
          tags:
            - tag: component
              value: lmtp
          triggers:
            - uuid: aac480dfa3f14fa7b0e75985c57cfe6b
              expression: 'avg(/Cyrus IMAP by Zabbix agent/cyrus.lmtp.pct,#3)>80 and avg(/Cyrus IMAP by Zabbix agent/cyrus.lmtp.pct,#3)<=95'
              name: 'Cyrus: LMTP children >80% of maxchild'
              priority: WARNING
              description: 'lmtpd children sustained above 80% of maxchild. Inbound delivery from the MTAs may start deferring.'
            - uuid: 43c59d9c96634e168a752325dcee4efa
              expression: 'avg(/Cyrus IMAP by Zabbix agent/cyrus.lmtp.pct,#3)>95'
              name: 'Cyrus: LMTP children >95% of maxchild (saturation imminent)'
              priority: HIGH
              description: 'lmtpd children sustained above 95% of maxchild. Inbound mail will defer/retry. Raise lmtp maxchild in cyrus.conf.'
        - uuid: 2aee23b7a8af48c7935bc557513fd42e
          name: 'Cyrus: ManageSieve children'
          type: DEPENDENT
          key: cyrus.sieve.children
          history: 7d
          trends: 365d
          value_type: UNSIGNED
          description: 'Current timsieved children (sieve:4190 + sieveold:2000 share the binary).'
          master_item:
            key: cyrus.stats
          preprocessing:
            - type: JSONPATH
              parameters:
                - $.sieve.children
          tags:
            - tag: component
              value: sieve
        - uuid: d9e2e2a7710642a5ae7698cb1090eda9
          name: 'Cyrus: ManageSieve children utilisation'
          type: DEPENDENT
          key: cyrus.sieve.pct
          history: 7d
          trends: 365d
          value_type: UNSIGNED
          units: '%'
          description: 'timsieved children as % of the sieve (:4190) maxchild cap.'
          master_item:
            key: cyrus.stats
          preprocessing:
            - type: JSONPATH
              parameters:
                - $.sieve.pct
          tags:
            - tag: component
              value: sieve
          triggers:
            - uuid: f437c6e8d3874a439de89e86567f1124
              expression: 'avg(/Cyrus IMAP by Zabbix agent/cyrus.sieve.pct,#3)>80 and avg(/Cyrus IMAP by Zabbix agent/cyrus.sieve.pct,#3)<=95'
              name: 'Cyrus: ManageSieve children >80% of maxchild'
              priority: WARNING
              description: 'timsieved children sustained above 80% of maxchild.'
            - uuid: 0cd47aefc95142ab9ba9291fe201ce13
              expression: 'avg(/Cyrus IMAP by Zabbix agent/cyrus.sieve.pct,#3)>95'
              name: 'Cyrus: ManageSieve children >95% of maxchild (saturation imminent)'
              priority: HIGH
              description: 'timsieved children sustained above 95% of maxchild. Raise sieve maxchild in cyrus.conf.'
        - uuid: ebbd12a0972a47b593727b7767076b7c
          name: 'Cyrus: idled process alive'
          type: DEPENDENT
          key: cyrus.idled.alive
          history: 7d
          trends: '0'
          value_type: UNSIGNED
          valuemap:
            name: Cyrus service state
          description: 'idled daemon up (1) / down (0). Drives IMAP IDLE push; if down, clients fall back to polling.'
          master_item:
            key: cyrus.stats
          preprocessing:
            - type: JSONPATH
              parameters:
                - $.idled
          tags:
            - tag: component
              value: cyrus
          triggers:
            - uuid: 5fbac65c5ec643b3be46ec70c6fcd0fd
              expression: 'last(/Cyrus IMAP by Zabbix agent/cyrus.idled.alive)=0'
              name: 'Cyrus: idled process is not running'
              priority: WARNING
              description: 'IMAP IDLE push notifications are unavailable; clients will fall back to polling.'
        - uuid: ee7fd02a058f4e52b5f75d067bffb13f
          name: 'Cyrus: notifyd process alive'
          type: DEPENDENT
          key: cyrus.notifyd.alive
          history: 7d
          trends: '0'
          value_type: UNSIGNED
          valuemap:
            name: Cyrus service state
          description: 'notifyd daemon up (1) / down (0). Handles event notifications (e.g. Sieve notify).'
          master_item:
            key: cyrus.stats
          preprocessing:
            - type: JSONPATH
              parameters:
                - $.notifyd
          tags:
            - tag: component
              value: cyrus
          triggers:
            - uuid: a338925090494a479b68bd17524608d9
              expression: 'last(/Cyrus IMAP by Zabbix agent/cyrus.notifyd.alive)=0'
              name: 'Cyrus: notifyd process is not running'
              priority: WARNING
              description: 'Cyrus event notifications (notifyd) are not running.'
        - uuid: 955c5a814ab24ae09828109586c144cb
          name: 'Cyrus: mailboxes.db size'
          type: DEPENDENT
          key: cyrus.db.mailboxes.size
          history: 7d
          trends: 365d
          value_type: UNSIGNED
          units: B
          description: 'Size of mailboxes.db in the Cyrus configdirectory. Trend it; unbounded growth can indicate a stuck checkpoint.'
          master_item:
            key: cyrus.stats
          preprocessing:
            - type: JSONPATH
              parameters:
                - $.db.mailboxes_bytes
          tags:
            - tag: component
              value: db
        - uuid: f791f1924f78443c86487991d1117f80
          name: 'Cyrus: deliver.db size'
          type: DEPENDENT
          key: cyrus.db.deliver.size
          history: 7d
          trends: 365d
          value_type: UNSIGNED
          units: B
          description: 'Size of deliver.db (duplicate-delivery suppression DB) in the Cyrus configdirectory.'
          master_item:
            key: cyrus.stats
          preprocessing:
            - type: JSONPATH
              parameters:
                - $.db.deliver_bytes
          tags:
            - tag: component
              value: db
        - uuid: d8d54821298a4191a53aeffd73a1280d
          name: 'Cyrus: IMAP (143) response time'
          type: ZABBIX_ACTIVE
          key: 'net.tcp.service.perf[imap,127.0.0.1,143]'
          delay: 1m
          history: 7d
          trends: 365d
          value_type: FLOAT
          units: s
          description: 'IMAP connect+banner time from the agent; 0 = not responding.'
          tags:
            - tag: component
              value: availability
          triggers:
            - uuid: 07399763e7724cab88b53ad4689f7c0b
              expression: 'last(/Cyrus IMAP by Zabbix agent/net.tcp.service.perf[imap,127.0.0.1,143])=0'
              name: 'Cyrus: IMAP port 143 not responding'
              priority: HIGH
              description: 'The IMAP service is not answering on 143 (refused, or accepted but no greeting — e.g. imap maxchild exhausted).'
              dependencies:
                - name: 'Cyrus: master process is not running'
                  expression: 'last(/Cyrus IMAP by Zabbix agent/cyrus.master.alive)=0'
            - uuid: 73df1decdecd4120862e8323e7dc6de3
              expression: 'avg(/Cyrus IMAP by Zabbix agent/net.tcp.service.perf[imap,127.0.0.1,143],#3)>2'
              name: 'Cyrus: IMAP (143) slow to respond'
              priority: WARNING
              description: 'IMAP greeting is slow (early sign of saturation or I/O pressure). Capped by the agent Timeout setting.'
        - uuid: 3ee3b9850f4744728037833983ef31a9
          name: 'Cyrus: IMAPS (993) reachable'
          type: ZABBIX_ACTIVE
          key: 'net.tcp.service.perf[tcp,127.0.0.1,993]'
          delay: 1m
          history: 7d
          trends: 365d
          value_type: FLOAT
          units: s
          description: 'TCP connect time to the IMAPS port; 0 = not listening. (TLS validity is checked separately.)'
          tags:
            - tag: component
              value: availability
          triggers:
            - uuid: 172c2ed0ec9b4bb38156f1895cf372cb
              expression: 'last(/Cyrus IMAP by Zabbix agent/net.tcp.service.perf[tcp,127.0.0.1,993])=0'
              name: 'Cyrus: IMAPS port 993 not listening'
              priority: HIGH
              dependencies:
                - name: 'Cyrus: master process is not running'
                  expression: 'last(/Cyrus IMAP by Zabbix agent/cyrus.master.alive)=0'
        - uuid: fb495de08cce483a9173159aeee66e99
          name: 'Cyrus: POP3 (110) response time'
          type: ZABBIX_ACTIVE
          key: 'net.tcp.service.perf[pop,127.0.0.1,110]'
          delay: 1m
          history: 7d
          trends: 365d
          value_type: FLOAT
          units: s
          description: 'POP3 connect+banner time from the agent; 0 = not responding.'
          tags:
            - tag: component
              value: availability
          triggers:
            - uuid: da1b309e0ffa463891afe517ecab68a9
              expression: 'last(/Cyrus IMAP by Zabbix agent/net.tcp.service.perf[pop,127.0.0.1,110])=0'
              name: 'Cyrus: POP3 port 110 not responding'
              priority: HIGH
              dependencies:
                - name: 'Cyrus: master process is not running'
                  expression: 'last(/Cyrus IMAP by Zabbix agent/cyrus.master.alive)=0'
            - uuid: 3b60f395ae08479792ef41b5dc4c48c9
              expression: 'avg(/Cyrus IMAP by Zabbix agent/net.tcp.service.perf[pop,127.0.0.1,110],#3)>2'
              name: 'Cyrus: POP3 (110) slow to respond'
              priority: WARNING
        - uuid: b08cbd0ff98041c3a83a2cac0e9b0bbc
          name: 'Cyrus: POP3S (995) reachable'
          type: ZABBIX_ACTIVE
          key: 'net.tcp.service.perf[tcp,127.0.0.1,995]'
          delay: 1m
          history: 7d
          trends: 365d
          value_type: FLOAT
          units: s
          description: 'TCP connect time to the POP3S port; 0 = not listening.'
          tags:
            - tag: component
              value: availability
          triggers:
            - uuid: c8079862f77c45e897b373b13cf5740f
              expression: 'last(/Cyrus IMAP by Zabbix agent/net.tcp.service.perf[tcp,127.0.0.1,995])=0'
              name: 'Cyrus: POP3S port 995 not listening'
              priority: HIGH
              dependencies:
                - name: 'Cyrus: master process is not running'
                  expression: 'last(/Cyrus IMAP by Zabbix agent/cyrus.master.alive)=0'
        - uuid: 9673fba612b5477fb98047bd3ea21100
          name: 'Cyrus: LMTP (24) reachable'
          type: ZABBIX_ACTIVE
          key: 'net.tcp.service.perf[tcp,127.0.0.1,24]'
