          history: 7d
          trends: 365d
          value_type: FLOAT
          units: s
          description: 'TCP connect time to the LMTP delivery port; 0 = not listening (inbound mail would defer).'
          tags:
            - tag: component
              value: availability
          triggers:
            - uuid: 9faf06f66bd74293ab60d0a74bc14c80
              expression: 'last(/Cyrus IMAP by Zabbix agent/net.tcp.service.perf[tcp,127.0.0.1,24])=0'
              name: 'Cyrus: LMTP port 24 not listening'
              priority: HIGH
              description: 'LMTP is not accepting connections; inbound mail from the MTAs will defer.'
              dependencies:
                - name: 'Cyrus: master process is not running'
                  expression: 'last(/Cyrus IMAP by Zabbix agent/cyrus.master.alive)=0'
        - uuid: d7bb89bf86b3495197289b31950f887f
          name: 'Cyrus: ManageSieve (4190) reachable'
          type: ZABBIX_ACTIVE
          key: 'net.tcp.service.perf[tcp,127.0.0.1,4190]'
          delay: 1m
          history: 7d
          trends: 365d
          value_type: FLOAT
          units: s
          description: 'TCP connect time to the ManageSieve port; 0 = not listening.'
          tags:
            - tag: component
              value: availability
          triggers:
            - uuid: 353732b5407e4e02a6a2d7b1bf84ef22
              expression: 'last(/Cyrus IMAP by Zabbix agent/net.tcp.service.perf[tcp,127.0.0.1,4190])=0'
              name: 'Cyrus: ManageSieve port 4190 not listening'
              priority: HIGH
              dependencies:
                - name: 'Cyrus: master process is not running'
                  expression: 'last(/Cyrus IMAP by Zabbix agent/cyrus.master.alive)=0'
        - uuid: d894fc85cae144f082eb4e66a7ee4adb
          name: 'Cyrus: log IOERROR'
          type: ZABBIX_ACTIVE
          key: 'log[{$CYRUS.LOG},"IOERROR"]'
          delay: 1m
          history: 7d
          value_type: LOG
          description: 'Matches IOERROR lines (mailbox file / disk I/O errors, possible corruption).'
          tags:
            - tag: component
              value: log
          triggers:
            - uuid: f21a3b4bfc5440c386efc9d03853a356
              expression: 'length(last(/Cyrus IMAP by Zabbix agent/log[{$CYRUS.LOG},"IOERROR"]))>0'
              name: 'Cyrus: IOERROR in log'
              priority: HIGH
              manual_close: 'YES'
              description: 'Cyrus logged an IOERROR — investigate disk/mailbox integrity (reconstruct may be needed). Close manually after review.'
        - uuid: 3dc4993d88794a1e924549ab51665868
          name: 'Cyrus: log DBERROR'
          type: ZABBIX_ACTIVE
          key: 'log[{$CYRUS.LOG},"DBERROR"]'
          delay: 1m
          history: 7d
          value_type: LOG
          description: 'Matches DBERROR lines (Cyrus database problems — often precede an outage).'
          tags:
            - tag: component
              value: log
          triggers:
            - uuid: 0592bcef39b246f7981341c49a16f2a2
              expression: 'length(last(/Cyrus IMAP by Zabbix agent/log[{$CYRUS.LOG},"DBERROR"]))>0'
              name: 'Cyrus: DBERROR in log'
              priority: HIGH
              manual_close: 'YES'
              description: 'Cyrus logged a DBERROR — a Cyrus database may be corrupt or locked (ctl_cyrusdb -r). Close manually after review.'
        - uuid: b977d899f3744e99ba4d2ed5eadf66bd
          name: 'Cyrus: log fatal/exit'
          type: ZABBIX_ACTIVE
          key: 'log[{$CYRUS.LOG},"Fatal error|master:.*exited"]'
          delay: 1m
          history: 7d
          value_type: LOG
          description: 'Matches fatal errors and unexpected service exits reported by the Cyrus master.'
          tags:
            - tag: component
              value: log
          triggers:
            - uuid: 1138366605964eb284796592823bf142
              expression: 'length(last(/Cyrus IMAP by Zabbix agent/log[{$CYRUS.LOG},"Fatal error|master:.*exited"]))>0'
              name: 'Cyrus: fatal error / service exit in log'
              priority: AVERAGE
              manual_close: 'YES'
              description: 'A Cyrus service hit a fatal error or exited unexpectedly. Close manually after review.'
        - uuid: 1a938080b4924c06a22c45cd06a607de
          name: 'Cyrus: TLS certificate (993, raw)'
          type: ZABBIX_ACTIVE
          key: 'web.certificate.get[{HOST.CONN},993]'
          delay: 1h
          history: 1d
          trends: '0'
          value_type: TEXT
          description: 'Master item: TLS certificate presented on the IMAPS port (agent2 web.certificate.get). All Cyrus TLS services normally share this certificate.'
          tags:
            - tag: component
              value: tls
        - uuid: b18f9c2e5b0d4c5fb8031b1b1621a905
          name: 'Cyrus: TLS certificate days until expiry'
          type: DEPENDENT
          key: cyrus.cert.imaps.daysleft
          history: 7d
          trends: 365d
          value_type: FLOAT
          description: 'Days until the IMAPS certificate expires (derived from the presented cert, independent of hostname validation).'
          master_item:
            key: 'web.certificate.get[{HOST.CONN},993]'
          preprocessing:
            - type: JAVASCRIPT
              parameters:
                - |
                  var o = JSON.parse(value);
                  return (o.x509.not_after.timestamp - Math.floor(Date.now() / 1000)) / 86400;
          tags:
            - tag: component
              value: tls
          triggers:
            - uuid: eb568f95d4974c57848d68125254d4fd
              expression: 'last(/Cyrus IMAP by Zabbix agent/cyrus.cert.imaps.daysleft)<14 and last(/Cyrus IMAP by Zabbix agent/cyrus.cert.imaps.daysleft)>=3'
              name: 'Cyrus: TLS certificate expires in < 14 days'
              priority: WARNING
              description: 'Renew the certificate used by the Cyrus TLS services.'
            - uuid: d8b2ba9827bc43baa52cc3c1b72bfac1
              expression: 'last(/Cyrus IMAP by Zabbix agent/cyrus.cert.imaps.daysleft)<3'
              name: 'Cyrus: TLS certificate expires in < 3 days (or expired)'
              priority: HIGH
              description: 'The Cyrus TLS certificate is about to expire or has expired — IMAPS/POP3S/STARTTLS clients will break.'
        - uuid: 39c0917dba894904a0e5fc62b70ad075
          name: 'Cyrus: TLS certificate validation result'
          type: DEPENDENT
          key: cyrus.cert.imaps.valid
